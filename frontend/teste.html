* {
    margin: 0;
    padding: 0;
}

body {
    display: flexbox; 
    justify-content: center;
    align-items: center;
    background: #01501f; 
    font-family: "MuseoModerno"; 
    font-weight: bolder;
    color: #fff; 
}

.dropdown{
    display: inline-block;
    position: relative;
    padding: 10px;
    margin: 0px;
}

.dropdown button{
    background-color: rgb(0, 160, 0);
    color: white;
    margin: 0px;
    padding: 5px;
    border: none;
    cursor: pointer;
    max-width: 150px;
    min-width: 60px;
    height: 5vh;
    border-bottom-right-radius: 15px;
    border-top-right-radius: 1em;
}

.dropdown a{
    display: block;
    color: black;
    text-decoration: none;
    padding: 10px 15px;
    transition: transform 0.3s ease-in-out;
}

.dropdown .menu{
    display: none;
    position: absolute;
    background-color: rgb(4, 155, 7);
    border-bottom-left-radius: 15px;
    border-bottom-right-radius: 15px;
    border-top-right-radius: 1em;
    min-width: 50px;
    box-shadow: 2px 3px 5px rgb(23, 92, 23);
}
.dropdown:hover .menu{
    display:block;
}

.dropdown:hover button{
    background-color:  rgb(1, 44, 1);
}

.dropdown  a:hover{
    background-color: rgb(0, 100, 32);
    border-radius: 1.1em;
    box-shadow: 3px 3px 5px rgb(8, 47, 8);
    color: white;
    transform: scale(1.05);
    font-size: 1.1em;

}  
</style>
